let kafkaData = [];
let tick = 0;

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randFloat(a, b, d=1) { return parseFloat((Math.random() * (b - a) + a).toFixed(d)); }
function timeNow() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function genLog() {
  const svc = LOG_SVCS[randInt(0, LOG_SVCS.length - 1)];
  const lvl = LOG_LEVELS[randInt(0, LOG_LEVELS.length - 1)];
  const msgs = LOG_MSGS[lvl];
  const msg = msgs[randInt(0, msgs.length - 1)];
  return { time: timeNow(), svc, lvl, msg };
}

function initLogs() {
  for (let i = 0; i < 30; i++) logs.push(genLog());
  const now = new Date();
  for (let i = 29; i >= 0; i--) {
    const t = new Date(now - i * 2000);
    timeLabels.push(`${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`);
    logsPerMin.push(randInt(40, 120));
    kafkaData.push(randInt(6000, 12000));
  }
}

function setPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.nav-item');
  const pages = ['dashboard','logs','services','alerts','analytics','ai','settings'];
  const idx = pages.indexOf(page);
  if (items[idx + 1]) items[idx + 1].classList.add('active');
  else if (items[0] && page === 'dashboard') items[0].classList.add('active');
  renderPage();
}

function getMetricBars(color, n=8) {
  const vals = Array.from({length:n}, () => randInt(20, 90));
  return vals.map(v => `<div class="mini-bar" style="height:${v}%;background:${color}"></div>`).join('');
}

  </div>`;

function filterLogs(q) {
  const el = document.getElementById('log-stream');
  if (!el) return;
  const filtered = q ? logs.filter(l => l.msg.toLowerCase().includes(q.toLowerCase()) || l.svc.toLowerCase().includes(q.toLowerCase()) || l.lvl.toLowerCase().includes(q.toLowerCase())) : logs.slice(-50);
  el.innerHTML = filtered.map(renderLogEntry).join('');
}

function togglePause() {
  logPaused = !logPaused;
  const btn = document.getElementById('pause-btn');
  if (btn) btn.textContent = logPaused ? '▶ Resume' : '⏸ Pause';
}

function clearLogs() { logs = []; updateLogStream(); }

function filterByLevel(level, btn) {
  document.querySelectorAll('.btn-sm').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('log-stream');
  if (!el) return;
  const filtered = level === 'ALL' ? logs.slice(-100) : logs.filter(l => l.lvl === level).slice(-100);
  el.innerHTML = filtered.map(renderLogEntry).join('');
}

          <input value="${s.val}" style="flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text1);font-family:var(--mono);outline:none" />
        </div>`).join('')}
        <div style="margin-top:4px;display:flex;gap:8px">
          <button class="btn-sm active">💾 Save Config</button>
          <button class="btn-sm">🔄 Reset Defaults</button>
          <button class="btn-sm">🧪 Test Connection</button>
        </div>
      </div>
    </div></div>`;
}

function renderPage() {
  const el = document.getElementById('main-content');
  if (!el) return;
  const pages = { dashboard: renderDashboard, logs: renderLogsPage, services: renderServicesPage, alerts: renderAlertsPage, analytics: renderAnalyticsPage, ai: renderAIPage, settings: renderSettingsPage };
  el.innerHTML = (pages[currentPage] || renderDashboard)();
  setTimeout(() => initCharts(), 50);
  scrollLogToBottom();
}

function initCharts() {
  const defaults = { responsive: true, maintainAspectRatio: false, animation: { duration: 400 }, plugins: { legend: { display: false } } };

  const logsEl = document.getElementById('chart-logs');
  if (logsEl && !charts.logs) {
    charts.logs = new Chart(logsEl, {
      type: 'line',
      data: {
        labels: timeLabels.slice(),
        datasets: [{ label: 'Logs/min', data: logsPerMin.slice(), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }]
      },
      options: { ...defaults, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 9 } } } } }
    });
  }

  const kafkaEl = document.getElementById('chart-kafka');
  if (kafkaEl && !charts.kafka) {
    charts.kafka = new Chart(kafkaEl, {
      type: 'line',
      data: {
        labels: timeLabels.slice(),
        datasets: [{ label: 'Events/s', data: kafkaData.slice(), borderColor: '#06b6d4', backgroundColor: 'rgba(6,182,212,0.08)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }]
      },
      options: { ...defaults, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 9 } } } } }
    });
  }

  const pieEl = document.getElementById('chart-pie');
  if (pieEl && !charts.pie) {
    charts.pie = new Chart(pieEl, {
      type: 'doughnut',
      data: {
        labels: ['AUTH-SVC', 'MONITORING', 'API-GW', 'REGISTRY'],
        datasets: [{ data: [45, 28, 19, 8], backgroundColor: ['#ef4444','#f59e0b','#3b82f6','#8b5cf6'], borderColor: '#080d1a', borderWidth: 3 }]
      },
      options: { ...defaults, cutout: '65%' }
    });
  }

  const barEl = document.getElementById('chart-bar');
  if (barEl && !charts.bar) {
    charts.bar = new Chart(barEl, {
      type: 'bar',
      data: {
        labels: ['AUTH','MONITORING','API-GW','REGISTRY'],
        datasets: [{ data: [8420, 12350, 19800, 3200], backgroundColor: ['rgba(59,130,246,0.7)','rgba(139,92,246,0.7)','rgba(6,182,212,0.7)','rgba(16,185,129,0.7)'], borderRadius: 4 }]
      },
      options: { ...defaults, scales: { x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 } } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 9 } } } } }
    });
  }
}

function updateCharts() {
  const t = new Date();
  const label = `${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;

  const newLog = randInt(40, 130);
  const newKafka = randInt(6000, 12000);

  timeLabels.push(label); if (timeLabels.length > 30) timeLabels.shift();
  logsPerMin.push(newLog); if (logsPerMin.length > 30) logsPerMin.shift();
  kafkaData.push(newKafka); if (kafkaData.length > 30) kafkaData.shift();

  if (charts.logs) { charts.logs.data.labels = timeLabels; charts.logs.data.datasets[0].data = logsPerMin; charts.logs.update('none'); }
  if (charts.kafka) { charts.kafka.data.labels = timeLabels; charts.kafka.data.datasets[0].data = kafkaData; charts.kafka.update('none'); }
  if (charts.bar) { charts.bar.data.datasets[0].data = SERVICES.map(() => randInt(2000, 22000)); charts.bar.update('none'); }
}

function updateLogStream() {
  if (logPaused) return;
  const el = document.getElementById('log-stream');
  if (!el) return;
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  el.innerHTML = logs.slice(-80).map(renderLogEntry).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function scrollLogToBottom() {
  const el = document.getElementById('log-stream');
  if (el) el.scrollTop = el.scrollHeight;
}

function updateMetrics() {
  metrics.totalLogs += randInt(20, 80);
  metrics.errors += Math.random() > 0.7 ? randInt(0, 3) : 0;
  metrics.kafkaEps = randInt(7000, 10000);
  metrics.health = randFloat(96, 99.9);
}

function tick_fn() {
  tick++;
  if (!logPaused) {
    const count = randInt(1, 3);
    for (let i = 0; i < count; i++) logs.push(genLog());
    if (logs.length > 1000) logs = logs.slice(-1000);
    updateLogStream();
  }
  if (tick % 5 === 0) {
    updateCharts();
    updateMetrics();
    if (currentPage === 'dashboard') {
      const cards = document.querySelectorAll('.metric-val');
      const vals = [(metrics.totalLogs/1000).toFixed(1)+'K', metrics.activeServices, metrics.errors, metrics.warnings, (metrics.kafkaEps/1000).toFixed(1)+'K', metrics.health+'%'];
      cards.forEach((c, i) => { if (vals[i] !== undefined) c.textContent = vals[i]; });
    }
  }
}

// INIT
initLogs();
renderPage();
setInterval(tick_fn, 1800);
</script>
